<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas & Indicadores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="{{ url_for('home') }}" class="sidebar-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bar-chart-3"><path d="M3 3v18h18"/><path d="M18 7V3"/><path d="M13 17V3"/><path d="M8 12V3"/></svg>
                    Metas & Indicadores
                </a>
            </div>

            <nav class="sidebar-nav-section">
                <div class="sidebar-nav-title">Navegação</div>
                <ul class="sidebar-nav-list">
                    <li>
                        <a href="{{ url_for('home') }}" class="nav-item {% if request.endpoint == 'home' %}active{% endif %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                            Home
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('painel_revenda') }}" class="nav-item {% if request.endpoint == 'painel_revenda' %}active{% endif %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-bar-chart-big"><path d="M3 3v18h18"/><path d="M18 7v10"/><path d="M13 5v14"/><path d="M8 9v6"/></svg>
                            Metas Revenda
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('painel_setores') }}" class="nav-item {% if request.endpoint == 'painel_setores' or request.endpoint == 'setor' %}active{% endif %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-kanban"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/><path d="M8 12h4"/><path d="M12 18h4"/><path d="M12 15h4"/></svg>
                            Metas por Setores
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('painel_area') }}" class="nav-item {% if request.endpoint == 'painel_area' %}active{% endif %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building-2"><path d="M6 22V7H4v15"/><path d="M18 22V7h-2v15"/><path d="M2 22h20"/><path d="M10 22V7h-2v15"/><path d="M14 22V7h-2v15"/><path d="M12 2L22 7l-10 5L2 7l10-5z"/></svg>
                            Metas por Área
                        </a>
                    </li>
                    <li>
                        <a href="{{ url_for('painel_individual') }}" class="nav-item {% if request.endpoint == 'painel_individual' %}active{% endif %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Metas Individual
                        </a>
                    </li>
                </ul>
            </nav>

            <nav class="sidebar-nav-section">
                <div class="sidebar-nav-title">Setores</div>
                <ul class="sidebar-nav-list">
                    {% for s in setores %}
                    <li>
                        <a href="{{ url_for('setor', nome=s) }}" class="nav-item {% if request.endpoint == 'setor' and setor == s %}active{% endif %}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right"><path d="m9 18 6-6-6-6"/></svg>
                            {{ s }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
